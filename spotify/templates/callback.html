<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Successful</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1DB954 0%, #191414 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .card {
            background: rgba(25, 20, 20, 0.95);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #1DB954;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 { font-size: 24px; margin-bottom: 12px; }
        p { color: #b3b3b3; margin-bottom: 12px; line-height: 1.6; font-size: 14px; }
        .success { color: #1DB954; font-weight: 600; }
        .path {
            background: #111;
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
            font-family: monospace;
            font-size: 13px;
            color: #1DB954;
            word-break: break-all;
        }
        .note { margin-top: 24px; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">✓</div>
        <h1>Authorization Successful!</h1>
        <p class="success">Your Spotify account has been connected.</p>
        <p>Tokens saved to:</p>
        <div class="path">{{TOKENS_PATH}}</div>
        <p class="note">You can close this window and return to the terminal to continue the migration.</p>
    </div>
</body>
</html>
